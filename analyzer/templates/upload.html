<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Upload Resume</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<style>
    <style>

.dark-mode {

    background: #000 !important;

    color: white !important;

}

.dark-mode .card {

    background: #111 !important;

    color: white !important;

    border: 1px solid #333;

}

.dark-mode p,
.dark-mode h1,
.dark-mode h2,
.dark-mode h3,
.dark-mode h4,
.dark-mode h5,
.dark-mode h6,
.dark-mode label,
.dark-mode span,
.dark-mode li,
.dark-mode td,
.dark-mode th {

    color: white !important;

}

.dark-mode .table {

    color: white !important;

}

.dark-mode .navbar {

    background: #111 !important;

}

.dark-mode .form-control {

    background: #222 !important;

    color: white !important;

    border: 1px solid #555;

}

.dark-mode .form-control::placeholder {

    color: #bbb;

}

.dark-mode footer {

    color: white !important;

}

</style>
</style>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow-sm">

    <div class="container-fluid px-4">

        <span class="navbar-brand mb-0 h1">
            AI Resume Analyzer
        </span>

        <div>

            <a href="/" class="btn btn-outline-light btn-sm me-2">
                Home
            </a>

            <a href="/dashboard/" class="btn btn-outline-light btn-sm me-2">
                Dashboard
            </a>

            <a href="/history/" class="btn btn-outline-light btn-sm me-2">
                History
            </a>

            <a href="/logout/" class="btn btn-danger btn-sm">
                Logout
            </a>
                <button id="themeToggle" class="btn btn-outline-light ms-2">
                🌙
                </button>
        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="card shadow p-5 rounded-4">

        <h1 class="text-center text-primary mb-4">
            Upload Your Resume
        </h1>

        <p class="text-center text-muted mb-4">

            Upload your resume to get ATS score,
            AI feedback, skill analysis,
            interview questions and career recommendations.

        </p>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <div class="text-center mt-4">

                <button type="submit" class="btn btn-primary btn-lg">

                    Analyze Resume

                </button>

            </div>

        </form>

    </div>

</div>
<script>

const toggleBtn = document.getElementById('themeToggle');

if(localStorage.getItem('theme') === 'dark') {

    document.body.classList.add('bg-dark');
    document.body.classList.remove('bg-light');
    document.body.style.color = 'white';

}

toggleBtn.addEventListener('click', () => {

    document.body.classList.toggle('bg-dark');

    document.body.classList.toggle('bg-light');

    if(document.body.classList.contains('bg-dark')) {

        document.body.style.color = 'white';

        localStorage.setItem('theme', 'dark');

    }

    else {

        document.body.style.color = 'black';

        localStorage.setItem('theme', 'light');

    }

});

</script>
<script>

const themeToggle = document.getElementById('themeToggle');

if(localStorage.getItem('theme') === 'dark') {

    document.body.classList.add('dark-mode');

}

themeToggle.addEventListener('click', () => {

    document.body.classList.toggle('dark-mode');

    if(document.body.classList.contains('dark-mode')) {

        localStorage.setItem('theme', 'dark');

    }

    else {

        localStorage.setItem('theme', 'light');

    }

});

</script>
</body>

</html>
